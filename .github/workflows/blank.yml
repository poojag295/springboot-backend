name: Spring Boot CI-CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # 3. Build project (FIXED PATH)
      - name: Build Maven project
        working-directory: ./springbootexample
        run: mvn clean package -DskipTests

      # 4. Run tests
      - name: Run tests
        working-directory: ./springbootexample
        run: mvn test

      # 5. Upload JAR file
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app
          path: springbootexample/target/*.jar


  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-app

      # -----------------------------
      # OPTION A: DEPLOY TO EC2 (REAL DEPLOYMENT)
      # -----------------------------
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            pkill -f 'java -jar' || true
            nohup java -jar *.jar > app.log 2>&1 &
