name: Spring Boot CI-CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # ONLY BUILD (NO TESTS)
      - name: Build project (skip tests completely)
        working-directory: ./springbootexample
        run: |
          echo "🔨 Building without running tests..."
          mvn clean package -DskipTests
          echo "✅ Build completed"

      - name: Show JAR
        run: ls -l springbootexample/target

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app
          path: springbootexample/target/*.jar


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-app
          path: app

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Deploying app..."

            mkdir -p /home/ubuntu/app
            cp app/*.jar /home/ubuntu/app/

            cd /home/ubuntu/app

            pkill -f "java -jar" || true

            JAR=$(ls *.jar | head -n 1)
            nohup java -jar $JAR > app.log 2>&1 &

            echo "✅ App running successfully"
